<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BioShield – Biometric Laboratory Test</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">

<style>
/* ── Premium Enterprise Palette ── */
:root {
    --bg-main: #0b1120;
    --bg-card: #111827;
    --bg-elevated: #1f2937;
    --border: #374151;
    --text-main: #f3f4f6;
    --text-muted: #9ca3af;
    
    --primary: #0ea5e9;
    --primary-hover: #0284c7;
    --success: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    
    --font-sans: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
}

body {
    background-color: var(--bg-main);
    color: var(--text-main);
    font-family: var(--font-sans);
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image: radial-gradient(circle at top left, rgba(14, 165, 233, 0.05), transparent 40%);
}

.test-container {
    width: 100%;
    max-width: 680px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    margin: 20px;
}

/* ── Brand Header ── */
.brand-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
    text-decoration: none;
}

.brand-icon {
    width: 48px; height: 48px;
    background: linear-gradient(135deg, var(--primary), #3b82f6);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; color: #fff;
    box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
}

.brand-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.5px;
    margin: 0;
}

.brand-subtitle {
    font-size: 0.9rem;
    color: var(--text-muted);
    font-weight: 500;
    margin: 4px 0 0 0;
}

/* ── Test Elements ── */
.phrase-label {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
}

.phrase-box {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-left: 4px solid var(--primary);
    border-radius: 8px;
    padding: 20px 24px;
    font-size: 1.1rem;
    font-family: var(--font-mono);
    color: var(--text-main);
    margin-bottom: 24px;
    letter-spacing: -0.5px;
    text-align: center;
}

.form-group {
    margin-bottom: 20px;
}

label {
    display: block;
    margin-bottom: 8px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

input[type="text"] {
    width: 100%;
    background: var(--bg-main);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    font-size: 1.05rem;
    font-family: var(--font-mono);
    color: var(--text-main);
    transition: all 0.2s;
    box-sizing: border-box;
}

input[type="text"]:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
}

/* ── HUD Grid ── */
.hud-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
}

@media (max-width: 550px) {
    .hud-grid { grid-template-columns: repeat(2, 1fr); }
}

.hud-item {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
}

.hud-label {
    display: block;
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 4px;
}

.hud-value {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--primary);
}

/* ── Buttons ── */
.btn {
    width: 100%;
    padding: 16px;
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); margin-top: 16px; }
.btn-outline:hover { background: var(--bg-elevated); border-color: var(--text-muted); }

/* ── Results Panel ── */
.result-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 24px;
}

.result-icon {
    font-size: 2.5rem;
    width: 64px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg-elevated);
    border-radius: 16px;
    border: 1px solid var(--border);
}

.feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

@media (max-width: 550px) {
    .feature-grid { grid-template-columns: repeat(2, 1fr); }
}

.stat-card {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
}

.stat-card .hud-label { margin-bottom: 6px; }
.stat-card .hud-value { font-size: 0.95rem; color: var(--text-main); }

/* ── Badges & Alerts ── */
.badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    font-family: var(--font-mono);
}

.badge.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
.badge.warn    { background: rgba(245, 158, 11, 0.1); color: var(--warn); border: 1px solid rgba(245, 158, 11, 0.2); }
.badge.danger  { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }

.alert {
    padding: 14px 16px;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 500;
    margin-top: 16px;
    display: none;
}
.alert.show { display: block; }
.alert-error { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--danger); }

/* Footer Nav */
.nav-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 24px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
}
.nav-link {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.2s;
}
.nav-link:hover { color: var(--text-main); }

/* Animation */
.fade-in { animation: fadeIn 0.4s ease forwards; }
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<div class="test-container">

    <a href="/dashboard" class="brand-header">
        <div class="brand-icon">🔬</div>
        <div>
            <h1 class="brand-title">Recognition Laboratory</h1>
            <p class="brand-subtitle">Test active biometric models</p>
        </div>
    </a>

    <div class="phrase-label">Target DNA Sequence</div>
    <div class="phrase-box" id="testPhrase">
        the quick brown fox jumps over the lazy dog
    </div>

    <div class="form-group">
        <label>Input Telemetry — Type Naturally</label>
        <input type="text" id="testInput" placeholder="Begin sequence input..." autocomplete="off" spellcheck="false">
    </div>

    <div class="hud-grid">
        <div class="hud-item">
            <span class="hud-label">Avg Dwell</span>
            <span class="hud-value" id="hudDwell">—</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Avg Flight</span>
            <span class="hud-value" id="hudFlight">—</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Velocity</span>
            <span class="hud-value" id="hudSpeed">—</span>
        </div>
        <div class="hud-item">
            <span class="hud-label">Match</span>
            <span class="hud-value" id="hudProgress">0/43</span>
        </div>
    </div>

    <button class="btn btn-primary" id="testBtn" disabled>
        <span id="btnText">Analyze Neural Pattern</span>
        <span id="btnSpinner" class="spinner" style="display:none; width:16px; height:16px; border-width:2px; margin-left:8px;"></span>
    </button>

    <div id="resultPanel" style="display:none; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);" class="fade-in">
        
        <div class="result-header">
            <div class="result-icon" id="resultIcon"></div>
            <div>
                <h2 id="resultLabel" style="margin: 0 0 4px 0; font-size: 1.4rem;"></h2>
                <div id="riskInfo"></div>
            </div>
        </div>

        <h3 style="font-size: 0.9rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;">Telemetry Breakdown</h3>
        <div class="feature-grid" id="featureGrid"></div>
        
        <button class="btn btn-outline" id="retestBtn">
            ↺ Initialize New Test
        </button>
    </div>

    <div id="alertBox" class="alert"></div>

    <div class="nav-footer">
        <a href="/dashboard" class="nav-link">← Dashboard</a>
        <a href="/enroll" class="nav-link">Re-enroll Biometrics →</a>
    </div>

</div>

<script>
window.BioShieldAPI = {
    getToken: () => localStorage.getItem('bs_token') || 'demo_token_2025',
    test: async (payload) => {
        return new Promise((resolve) => {
            setTimeout(() => {
                const data = payload.keystroke_data;
                const hasData = data && data.events && data.events.length > 10;
                
                let avgDwell = 0, avgFlight = 0, avgJitter = 0, backspaceRate = 0;
                
                if (hasData) {
                    const dwells = data.events.filter(e => e.dwell).map(e => e.dwell);
                    const flights = [];
                    for (let i = 1; i < data.events.length; i++) {
                        if (data.events[i-1].pressTime && data.events[i].pressTime) {
                            flights.push(data.events[i].pressTime - data.events[i-1].pressTime);
                        }
                    }
                    avgDwell = dwells.length ? dwells.reduce((a,b)=>a+b,0)/dwells.length : 120;
                    avgFlight = flights.length ? flights.reduce((a,b)=>a+b,0)/flights.length : 110;
                    
                    if (dwells.length > 2) {
                        let varSum = dwells.reduce((sum,v)=> sum + Math.pow(v - avgDwell,2),0);
                        avgJitter = Math.sqrt(varSum/dwells.length);
                    } else avgJitter = 18;
                    
                    backspaceRate = data.backspaceCount ? Math.min(0.35, data.backspaceCount / data.events.length) : 0.02;
                } else {
                    avgDwell = 135; avgFlight = 125; avgJitter = 22; backspaceRate = 0.05;
                }
                
                const referenceDwell = 128, referenceFlight = 112;
                const dwellDev = Math.abs(avgDwell - referenceDwell) / referenceDwell;
                const flightDev = Math.abs(avgFlight - referenceFlight) / referenceFlight;
                let rawScore = (dwellDev * 0.5 + flightDev * 0.3 + (avgJitter > 35 ? 0.2 : 0.05) + backspaceRate * 0.8);
                let risk_score = Math.min(0.98, Math.max(0.02, rawScore));
                
                let recognized = risk_score < 0.38;
                let decision = recognized ? "GRANTED" : (risk_score > 0.72 ? "BLOCKED" : "REQUIRE_2FA");
                
                resolve({
                    result: recognized ? "Identity Recognized" : "Identity Mismatch",
                    risk_score: risk_score,
                    decision: decision,
                    features: {
                        avg_dwell_time: avgDwell,
                        avg_flight_time: avgFlight,
                        avg_typing_speed: (1000 / (avgDwell+avgFlight||1) * 2).toFixed(1),
                        avg_jitter: avgJitter,
                        avg_backspace_rate: backspaceRate,
                    },
                    details: {
                        z_dwell: (avgDwell - referenceDwell) / 22,
                        confidence: recognized ? 0.89 : 0.43
                    },
                    isRecognized: recognized
                });
            }, 760);
        });
    }
};

class KeystrokeCapture {
    constructor({ minKeys = 5 } = {}) {
        this.minKeys = minKeys;
        this.reset();
    }
    reset() {
        this.events = [];
        this.keyMap = new Map();
        this.inputValue = '';
        this.backspaceCount = 0;
        this.expectedPhrase = "the quick brown fox jumps over the lazy dog";
        this.lastUpdate = 0;
    }
    attach(inputEl) {
        this.input = inputEl;
        inputEl.addEventListener('keydown', this.handleKeyDown.bind(this));
        inputEl.addEventListener('keyup', this.handleKeyUp.bind(this));
        inputEl.addEventListener('input', this.handleInput.bind(this));
    }
    handleKeyDown(e) {
        const now = performance.now();
        const key = e.key;
        if (key === 'Backspace') this.backspaceCount++;
        this.keyMap.set(key, { down: now, up: null });
    }
    handleKeyUp(e) {
        const now = performance.now();
        const key = e.key;
        const record = this.keyMap.get(key);
        if (record && record.down) {
            const dwell = now - record.down;
            this.events.push({
                key: key,
                pressTime: record.down,
                releaseTime: now,
                dwell: dwell,
            });
            this.keyMap.delete(key);
            this.lastUpdate = now;
            if (this.onUpdate) this.onUpdate();
        }
    }
    handleInput() {
        this.inputValue = this.input.value;
        if (this.onUpdate) this.onUpdate();
    }
    getData() {
        const relevantEvents = this.events.slice(-150);
        const flightTimes = [];
        for (let i = 1; i < relevantEvents.length; i++) {
            if (relevantEvents[i].pressTime && relevantEvents[i-1].releaseTime) {
                flightTimes.push(relevantEvents[i].pressTime - relevantEvents[i-1].releaseTime);
            }
        }
        const dwells = relevantEvents.map(e => e.dwell).filter(v => v > 0 && v < 800);
        return {
            events: relevantEvents,
            avg_dwell: dwells.length ? dwells.reduce((a,b)=>a+b,0)/dwells.length : 0,
            avg_flight: flightTimes.length ? flightTimes.reduce((a,b)=>a+b,0)/flightTimes.length : 0,
            backspaceCount: this.backspaceCount,
            totalChars: this.inputValue.length
        };
    }
    isReady() {
        const data = this.getData();
        return data.events.length >= this.minKeys && this.inputValue.trim().length > 12;
    }
    onUpdate() {}
}

const capture = new KeystrokeCapture({ minKeys: 8 });
const testInput = document.getElementById('testInput');
const testBtn = document.getElementById('testBtn');
const hudDwell = document.getElementById('hudDwell');
const hudFlight = document.getElementById('hudFlight');
const hudSpeed = document.getElementById('hudSpeed');
const hudProgress = document.getElementById('hudProgress');
const targetPhrase = "the quick brown fox jumps over the lazy dog";

function updateDynamicHUD() {
    const data = capture.getData();
    
    hudDwell.textContent = data.avg_dwell ? `${data.avg_dwell.toFixed(1)} ms` : '—';
    hudFlight.textContent = data.avg_flight ? `${data.avg_flight.toFixed(1)} ms` : '—';
    
    if (data.avg_dwell && data.avg_flight && (data.avg_dwell+data.avg_flight)>0) {
        let kps = (1 / ((data.avg_dwell + data.avg_flight)/1000)).toFixed(2);
        hudSpeed.textContent = `${kps} k/s`;
    } else {
        hudSpeed.textContent = '—';
    }

    let matchedLen = 0;
    if(testInput.value) {
        for(let i=0; i<testInput.value.length; i++) {
            if(i < targetPhrase.length && testInput.value[i] === targetPhrase[i]) matchedLen++;
        }
    }
    hudProgress.textContent = `${matchedLen}/${targetPhrase.length}`;
    
    // Auto color input if correct
    if (testInput.value.trim() === targetPhrase) {
        testInput.style.borderColor = 'var(--success)';
        testInput.style.color = 'var(--success)';
    } else {
        testInput.style.borderColor = 'var(--border)';
        testInput.style.color = 'var(--text-main)';
    }

    testBtn.disabled = !capture.isReady() || testInput.value.length < targetPhrase.length * 0.7;
}

capture.attach(testInput);
capture.onUpdate = updateDynamicHUD;
testInput.addEventListener('input', updateDynamicHUD);

function showAlert(msg, type) {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = `alert alert-${type} show`;
}

function renderRiskBadge(decision, riskScore) {
    let styleClass = decision === "GRANTED" ? "success" : (decision === "BLOCKED" ? "danger" : "warn");
    let text = decision === "GRANTED" ? "Access Authorized" : (decision === "BLOCKED" ? "Threat Detected" : "Step-Up Required");
    return `
        <div class="badge ${styleClass}">
            ${text} · Risk Var: ${Math.round(riskScore*100)}%
        </div>
    `;
}

testBtn.addEventListener('click', async () => {
    document.getElementById('btnText').textContent = 'Analyzing Neural Pattern...';
    document.getElementById('btnSpinner').style.display = 'inline-block';
    testBtn.disabled = true;
    
    try {
        const rawData = capture.getData();
        const data = await BioShieldAPI.test({ 
            keystroke_data: {
                events: rawData.events,
                avgDwell: rawData.avg_dwell,
                avgFlight: rawData.avg_flight,
                backspaceCount: rawData.backspaceCount,
            } 
        });
        
        const isRecognized = data.isRecognized;
        const score = data.risk_score || 0;
        
        document.getElementById('resultIcon').innerHTML = isRecognized ? '✅' : '❌';
        document.getElementById('resultLabel').textContent = data.result;
        document.getElementById('resultLabel').style.color = isRecognized ? 'var(--success)' : 'var(--danger)';
        
        document.getElementById('riskInfo').innerHTML = renderRiskBadge(data.decision, score);
        
        const features = data.features || {};
        const details = data.details || {};
        document.getElementById('featureGrid').innerHTML = `
            <div class="stat-card"><div class="hud-label">Dwell Time</div><div class="hud-value">${features.avg_dwell_time ? features.avg_dwell_time.toFixed(1)+' ms' : '—'}</div></div>
            <div class="stat-card"><div class="hud-label">Flight Time</div><div class="hud-value">${features.avg_flight_time ? features.avg_flight_time.toFixed(1)+' ms' : '—'}</div></div>
            <div class="stat-card"><div class="hud-label">Typing Speed</div><div class="hud-value">${features.avg_typing_speed ? features.avg_typing_speed+' cps' : '—'}</div></div>
            <div class="stat-card"><div class="hud-label">Rhythm Jitter</div><div class="hud-value">${features.avg_jitter ? features.avg_jitter.toFixed(1)+' ms' : '—'}</div></div>
            <div class="stat-card"><div class="hud-label">Backspace Rate</div><div class="hud-value">${features.avg_backspace_rate !== undefined ? (features.avg_backspace_rate*100).toFixed(1)+'%' : '—'}</div></div>
            <div class="stat-card"><div class="hud-label">Z-Score (Dwell)</div><div class="hud-value">${details.z_dwell !== undefined ? details.z_dwell.toFixed(2) : '—'}</div></div>
        `;
        
        document.getElementById('resultPanel').style.display = 'block';
        document.getElementById('alertBox').classList.remove('show');
        
    } catch (err) {
        showAlert(err.error || err.message || 'Authentication engine error', 'error');
    } finally {
        document.getElementById('btnText').textContent = 'Analyze Neural Pattern';
        document.getElementById('btnSpinner').style.display = 'none';
    }
});

document.getElementById('retestBtn').addEventListener('click', () => {
    capture.reset();
    testInput.value = '';
    testInput.style.borderColor = 'var(--border)';
    testInput.style.color = 'var(--text-main)';
    document.getElementById('resultPanel').style.display = 'none';
    document.getElementById('alertBox').classList.remove('show');
    testBtn.disabled = true;
    updateDynamicHUD();
    testInput.focus();
});

updateDynamicHUD();
</script>
</body>
</html>
